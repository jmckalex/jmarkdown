<div class="theorem">
  <p>A plain name renders as a div with that class.</p>
</div>
<pull-quote>
  <p>A hyphenated name renders as a custom element.</p>
</pull-quote>
<div class="side-bar">
  <p>The dot prefix forces a class even on a hyphenated name.</p>
</div>
<aside id="a" data-label="Note">
  <p>The angle-bracket wrapper forces an element on a plain name, with attrs and a label.</p>
</aside>
