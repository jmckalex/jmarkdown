<div class="theorem-env theorem-plain" data-kind="theorem" data-name="Pythagoras" id="thm:pyth" data-xref-number="1" data-xref-type="theorem">
  <p><span class="theorem-label">Theorem 1 (Pythagoras).</span> For a right triangle, $a^2 + b^2 = c^2$.</p>
</div>
<div class="theorem-env theorem-definition" data-kind="definition" id="def:rt" data-xref-number="2" data-xref-type="definition">
  <p><span class="theorem-label">Definition 2.</span> A <strong>right triangle</strong> has one ninety-degree angle.</p>
</div>
<div class="proof-env">
  <p><span class="proof-label">Proof.</span> By rearrangement of areas.</p>
  <span class="qed">∎</span>
</div>
<p>By <a class="xref-cref" href="#thm:pyth">theorem&nbsp;1</a> and <a class="xref-cref" href="#def:rt">definition&nbsp;2</a> we are done. See also <a class="xref-cref" href="#thm:pyth">Theorem&nbsp;1</a>.</p>
