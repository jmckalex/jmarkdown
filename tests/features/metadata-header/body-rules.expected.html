<p>A fenced code block that <strong>shows</strong> a metadata header keeps its <code>---</code> fences
  verbatim — they must not be mistaken for the document's own header terminator:</p>
<pre><code class="hljs">---
Title: Example
Author: Someone
---
</code></pre>
<p>A <code>---</code> line in prose is an ordinary thematic break, not a stray terminator:</p>
<hr>
<p>Done.</p>
