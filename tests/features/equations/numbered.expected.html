<div class="equation" id="eq:mass">
  <span class="eqn-body">\[
    E = mc^2
    \]</span>
  <span class="eqn-number">(1)</span>
</div>
<div class="equation" id="eq:sum">
  <span class="eqn-body">\[
    \sum_{i=1}^n i = \frac{n(n+1)}{2}
    \]</span>
  <span class="eqn-number">(2)</span>
</div>
<p>By <a class="xref-ref" href="#eq:mass">1</a> and <a class="xref-cref" href="#eq:sum">equation&nbsp;(2)</a> we relate them. See also <a class="xref-cref" href="#eq:mass">Equation&nbsp;(1)</a>.</p>
