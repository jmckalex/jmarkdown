<p>A column-span-only table:</p>
<table>
  <thead>
    <tr>
      <th>H1</th>
      <th>H2</th>
      <th>H3</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td colspan="3">This cell spans 3 columns</td>
    </tr>
    <tr>
      <td colspan="2">Two-col span</td>
      <td>Single</td>
    </tr>
  </tbody>
</table>
<p>A row-span + col-span table:</p>
<table>
  <thead>
    <tr>
      <th colspan="2" rowspan="2">This header spans two columns and two rows </th>
      <th>Header A</th>
    </tr>
    <tr>
      <th>Header B</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Cell A</td>
      <td style="text-align:right;">Cell B</td>
      <td>Cell C</td>
    </tr>
  </tbody>
</table>
